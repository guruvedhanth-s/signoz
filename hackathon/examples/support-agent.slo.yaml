# Example SLO-as-code file for the SLO engine.
# Point the server at it with:
#   export SIGNOZ_SLO_CONFIG_PATH=/absolute/path/to/support-agent.slo.yaml
#
# Targets may be written as a percentage (99) or a fraction (0.99).
service: support-agent
environment: local

slos:
  - name: successful-agent-runs
    description: Agent runs should complete without an error.
    type: ratio
    target: 99
    window: 30d
    good_query: agent_success_total
    total_query: agent_requests_total
    # Gate this SLO on the Telemetry Health Auditor: if telemetry is incomplete,
    # the result is reported as indeterminate instead of a false green.
    requires_completeness: true
